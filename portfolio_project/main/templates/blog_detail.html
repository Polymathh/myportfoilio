<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ page_title }}</title>
        <meta name="description" content="{{ page_description }}">
        <meta name="keywords" content="{{ seo.keywords }}">
        <meta name="author" content="{{ profile.name }}">
        {% load static %}
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="icon" href="{% static 'favicon.ico' %}" sizes="any">
        <link rel="shortcut icon" href="{% static 'favicon.ico' %}">
        <link rel="apple-touch-icon" href="{% static 'logo/wambugu1.png' %}">
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    </head>
    <body>
        <nav>
            <div class="logo">
                <img src="{% static 'logo/wambugu.png' %}" alt="logo">
            </div>
            <!-- Humbuger menu -->
             <div class="humbuger"  id="humbuger" onclick="toggleMenu()">
                ☰
             </div>
            <ul id="nav-links">
                <li><a href="{% url 'home' %}#home">Home</a></li>
                <li><a href="{% url 'home' %}#about">About</a></li>
                <li><a href="{% url 'home' %}#projects">Projects</a></li>
                <li><a href="{% url 'home' %}#contact">Contact</a></li>
                <li><a href="{% url 'blog_list' %}">Blog</a></li>
            </ul>
         </nav>

        <main class="article-page">
            <div class="article-shell">
                <a href="{% url 'blog_list' %}" class="back-link">Back to Blog</a>
                <article class="article">
                    <p class="blog-date">{{ post.published_at|date:"M d, Y" }}</p>
                    <h1>{{ post.title }}</h1>
                    <p class="article-excerpt">{{ post.excerpt }}</p>
                    {% if post.cover_image %}
                        <img src="{{ post.cover_image.url }}" alt="{{ post.title }}" class="article-cover">
                    {% endif %}
                    <div class="article-body">
                        {{ post.content|linebreaks }}
                    </div>
                </article>
            </div>
        </main>

        <!-- Your existing JavaScript — keep type as default -->
    <script>
        const humbuger = document.getElementById("humbuger");
        const navLinks = document.getElementById("nav-links");
    
        humbuger.addEventListener("click", () => {
        navLinks.classList.toggle("show");
        });
    
        document.querySelectorAll("#nav-links a").forEach(link => {
        link.addEventListener("click", () => {
            navLinks.classList.remove("show");
        });
        });

        const filterBtns = document.querySelectorAll(".filter-btn");
        const projectCards = document.querySelectorAll(".project-card");

        filterBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            filterBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            const filter = btn.getAttribute("data-filter");

            projectCards.forEach(card => {
            if (filter === "all" || card.dataset.category === filter) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
            });
        });
        });
    </script>

    <!-- Schema markup — completely separate tag -->
    <script type="application/ld+json">
    {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Moses Wambugu",
    "alternateName": "Wambugu Moses",
    "url": "https://wambuguai.website",
    "image": "https://wambuguai.website/static/logo/wambugu1.png",
    "jobTitle": "Agentic AI Systems Builder",
    "description": "AI Engineer and educator from Nairobi, Kenya. Building agentic AI systems and teaching Africa to use AI while empowering Africans to Innovate, Build & Thrive",
    "address": {
        "@type": "PostalAddress",
        "addressLocality": "Nairobi",
        "addressCountry": "KE"
    },
    "sameAs": [
        "https://www.linkedin.com/in/wambugumoses",
        "https://www.tiktok.com/@wambugu_ai",
        "https://github.com/Polymathh",
        "https://www.instagram.com/wambugu_ai",
        "https://www.facebook.com/profile.php?id=61575331600247"
    ]
    }
    </script>
    </body>
</html>
